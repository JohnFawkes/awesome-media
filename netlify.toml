[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

# Deploy Previews (one per PR) use the same build; production still
# deploys via GitHub Pages/Actions, this is for previews only.
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
